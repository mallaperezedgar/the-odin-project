<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App del Tiempo</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <main class="app" >
        <h1> App Meteorológica</h1>

        <form class="buscador" id="tiempo-formulario">
            <input type="text" id="localizacion" placeholder="Introduce una ciudad y pais">
            <button type="submit">Buscar</button>
        </form>

        <section class="tarjeta-tiempo">
            <h2 class="ciudad">Madrid</h2>

            <div class="info-principal">
                <img src="" alt="clima">
                <span class="temperatura">22°C</span>
            </div>

            <div class="info-secundaria">
                <div>💨 Viento: 10 km/h</div>
                <div>💧 Humedad: 60%</div>
            </div>
        </section>
    </main>

   
</body>
</html>
